services:
  - type: web
    name: stisip-backend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: stisip-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: stisip-db
    region: singapore
    plan: free
    databaseName: cms_kampus_db
    ipAllowList: []
